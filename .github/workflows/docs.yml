name: Deploy docs

# Build the MkDocs Material site on every push that touches docs sources and,
# when that push lands on main, publish the built site to the `gh-pages`
# branch via `mkdocs gh-deploy`. GitHub Pages must be configured (repo
# Settings → Pages → "Deploy from a branch" → `gh-pages` / root) for the
# published site to go live at https://fkberthold.github.io/mforth/ — that
# one-time toggle is a human step the workflow cannot perform.
#
# `on:` is quoted so YAML 1.1 loaders don't coerce the key to the boolean
# `true` (a well-known GitHub Actions footgun that confuses some linters).
"on":
  push:
    branches:
      - main
    paths:
      - docs/**
      - mkdocs.yml
      - requirements-docs.txt
      - .github/workflows/docs.yml
  # Allow a manual rebuild/redeploy from the Actions tab without a code push
  # (e.g. after flipping the Pages toggle, or to recover from a failed run).
  workflow_dispatch:

# `gh-deploy` pushes to the gh-pages branch, so the job needs write access to
# repository contents.
permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gh-deploy needs full history of the gh-pages branch to compute a
          # clean commit; fetch-depth 0 avoids "shallow update not allowed".
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs toolchain
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt

      # Strict build is the gate: warnings (broken links, missing nav targets,
      # unresolved snippet includes) become errors and fail the run before we
      # publish anything. Runs on every trigger, including workflow_dispatch.
      - name: Build site (strict)
        run: mkdocs build --strict

      # Only publish when the build was triggered by a push to main (or a
      # manual dispatch from main). A strict build that fails above never
      # reaches here.
      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main'
        env:
          # gh-deploy makes a commit on the gh-pages branch; give it an
          # identity so the push isn't rejected for a missing committer.
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
        run: mkdocs gh-deploy --force --no-history
