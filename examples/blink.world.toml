# Sidecar for blink.fs — sends "hello" to a message block once per tick.
# This file pairs with blink.fs (same basename, sibling on disk).

[links.display]
# Mode A: bind by in-game name (recommended). 'display' is the stable
# mforth-name the .fs source references; 'message1' is what shows up in
# the in-game block label. Re-link order doesn't matter — the engine
# looks up the block by name.
type   = "message"
target = "message1"

[clock]
ipt      = 8      # logic processor (default; micro=2, hyper=25)
realtime = false  # tests advance `wait` instantly
