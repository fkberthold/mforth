site_name: mforth
site_description: A pragmatic Forth dialect that compiles to Mindustry's mlog — host REPL, AOT compiler, LSP, and tree-sitter grammar, sharing one analyzer.
repo_url: https://github.com/fkberthold/mforth
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - include-markdown:
      exclude:
        - "**/internal/**"
        - "**/*.draft.md"

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Tutorials:
      - tutorials/index.md
      - Getting started: tutorials/getting-started.md
      - Learn Forth:
          - tutorials/learn-forth/index.md
          - 1. The stack & postfix: tutorials/learn-forth/01-stack.md
          - 2. Juggling the stack: tutorials/learn-forth/02-juggling.md
          - 3. Defining words: tutorials/learn-forth/03-defining.md
          - 4. Arithmetic & truth: tutorials/learn-forth/04-arithmetic.md
          - 5. Branching: tutorials/learn-forth/05-branching.md
          - 6. Looping: tutorials/learn-forth/06-looping.md
          - 7. State & variables: tutorials/learn-forth/07-state.md
          - 8. Output: tutorials/learn-forth/08-output.md
          - 9. Factoring: tutorials/learn-forth/09-factoring.md
          - 10. Meet the simulator: tutorials/learn-forth/10-simulator.md
          - 11. Reading the world: tutorials/learn-forth/11-sensing.md
          - 12. Acting on the world: tutorials/learn-forth/12-controlling.md
          - 13. A control loop: tutorials/learn-forth/13-control-loop.md
          - 14. Capstone - the sorter: tutorials/learn-forth/14-capstone.md
          - 15. Where next: tutorials/learn-forth/15-where-next.md
      - Writing mforth for Mindustry: tutorials/writing-mforth-for-mindustry.md
  - How-to:
      - how-to/index.md
      - Install: how-to/install.md
      - Use with Helix: how-to/use-with-helix.md
      - Use with Neovim: how-to/use-with-nvim.md
      - Pin a sidecar link by index: how-to/pin-sidecar-link-by-index.md
      - Verify REPL ↔ mlog equivalence: how-to/verify-repl-mlog-equivalence.md
      - Use the web visualizer: how-to/use-the-web-visualizer.md
  - Reference:
      - reference/index.md
      - CLI: reference/cli.md
      - Dictionary: reference/dictionary.md
      - Sidecar schema: reference/sidecar-schema.md
      - Events: reference/events.md
      - mlog lowering: reference/mlog-lowering.md
      - Optimization levels: reference/optimization-levels.md
  - Explanation:
      - explanation/index.md
      - Why mforth: explanation/why-mforth.md
      - Forth, the mental model: explanation/forth-mental-model.md
