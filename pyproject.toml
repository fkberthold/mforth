[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mforth"
version = "0.0.1"
description = "Pragmatic Forth dialect that compiles to Mindustry mlog"
requires-python = ">=3.11"
authors = [{ name = "Frank Berthold" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.hatch.build.targets.wheel]
packages = ["src/mforth"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q"
