# Exercise spec — bundled package data (bead mforth-roz.2).
# See 01-double.spec.toml / src/mforth/exercises/__init__.py for the schema.
id = "forth-101/03-rpn-add-mul"
prompt = "Compute (5 + 3) * 2 in postfix and leave it on the stack. Write ONLY the calculation (no `:`, no `.`) — the checker prints the result for you."
hint = "In postfix the operator comes after its two operands. Add first (5 3 +), THEN multiply the 8 by 2 (2 *). No parentheses needed: the token order IS the evaluation order."

[[case]]
driver = "."
expect = ["16"]
