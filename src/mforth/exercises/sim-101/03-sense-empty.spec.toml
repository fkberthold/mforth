# Exercise spec — bundled package data (track sim-101, bead mforth-roz.5).
#
# Part II, chapter 11 (sensing). SENSOR reads a block property and pushes
# it. The sidecar SEEDS `vault1` with a real copper level (bead
# mforth-0pg), so the learner senses an ACTUAL stocked value — not the
# empty-block 0 default — and decides whether the vault is out of copper.
# A stocked vault (copper = 240) is NOT empty, so `copper-empty?` leaves
# 0: the learner watches their decision react to data the sidecar set.
id = "sim-101/03-sense-empty"
prompt = "Define `copper-empty?` ( -- flag ): SENSOR the `@copper` level of `vault1` and leave 1 if it is empty (level = 0), else 0."
hint = "`vault1 @copper SENSOR` pushes the level (the sidecar seeded it to 240). Then `0 =` turns  is it zero?  into a 1/0 flag. The driver prints it for you."
sidecar = """
[links.vault1]
type    = "core"
target  = "vault1"
sensors = { "@copper" = 240 }
"""

[[case]]
driver = "copper-empty? ."
expect = ["0"]
