# Exercise spec — bundled package data (track sim-101, bead mforth-roz.5).
#
# Part II, chapter 11 (sensing). Two readings, one comparison: a vault is
# OVER half full when its item count, doubled, exceeds its capacity. Both
# readings come from the same block via two SENSORs. In the simulator a
# fresh vault is empty (0 items, 0 capacity), so `0 > 0` is false and the
# answer is 0 — the empty-vault baseline a real balancer starts from.
id = "sim-101/04-half-full"
prompt = "Define `over-half?` ( -- flag ): SENSOR `vault1`'s `@totalItems` and `@itemCapacity`; leave 1 if items*2 > capacity, else 0."
hint = "Sense the count, double it (`2 *`), sense the capacity, then `>`. Stack: ( items*2 capacity -- flag )."
sidecar = """
[links.vault1]
type   = "core"
target = "vault1"
"""

[[case]]
driver = "over-half? ."
expect = ["0"]
