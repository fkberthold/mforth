# Exercise spec — bundled package data (track sim-101, bead mforth-roz.5).
#
# Part II, chapter 12 (controlling). The decision half of a controller:
# sense the vault, decide whether the miner should run. We want the miner
# ON while the vault is NOT full — here, while it has room. The sidecar
# SEEDS `vault1` with 80 items in a 100-capacity vault (bead mforth-0pg),
# so `80 < 100` is true: the vault HAS room and `should-run?` leaves 1.
# Because the checker compares PRINTED output (CONTROL-ENABLED emits a
# control event, not a print), the learner returns the on/off flag and
# the driver prints it. Chapter 13 wires the same flag straight into
# CONTROL-ENABLED.
id = "sim-101/05-decide"
prompt = "Define `should-run?` ( -- flag ): leave 1 when `vault1` has room (its `@totalItems` is below its `@itemCapacity`), else 0 — the flag a miner switch should be set to."
hint = "Sense items, sense capacity, then `<`. Stack: ( items capacity -- flag ). The sidecar seeded 80 items in a 100-capacity vault, so `80 < 100` is true — there's room, run the miner."
sidecar = """
[links.vault1]
type    = "core"
target  = "vault1"
sensors = { "@totalItems" = 80, "@itemCapacity" = 100 }
"""

[[case]]
driver = "should-run? ."
expect = ["1"]
